  <div class="ad-slot" id="footerAd"></div>

</footer>

<script type="text/javascript">
  var atOptions = {
    'key': 'eb64514c8ad66e0c2f82e4a5fee98217',
    'format': 'iframe',
    'height': 250,
    'width': 300,
    'params': {}
  };
</script>

<script>
const titles = [
  "Top Open World Games You Must Play",
  "Hidden Secrets in RPG Games",
  "Best Indie Games This Year",
  "Why Multiplayer Games Dominate",
  "Best Gaming Setup Tips",
  "Retro Games Still Worth Playing",
  "Future of Cloud Gaming",
  "Best Strategy Games Ever",
  "Gaming Graphics Evolution",
  "Upcoming Games to Watch"
];

const paragraphs = [
  "Gaming technology continues to improve with better graphics and immersive gameplay.",
  "Players enjoy massive open worlds filled with quests and secrets.",
  "Competitive multiplayer games attract millions of players worldwide.",
  "Indie developers create some of the most creative gaming experiences.",
  "Gaming communities grow thanks to streaming and esports.",
  "Modern engines allow developers to build realistic worlds.",
  "Exploration and storytelling make games unforgettable.",
  "Many gamers build high performance setups for better gameplay."
];

let adCount = 0;

function injectAd(container) {
  const wrapper = document.createElement('div');
  wrapper.className = 'ad-slot';
  wrapper.id = 'ad-' + (adCount++);
  container.appendChild(wrapper);

  setTimeout(() => {
    const s = document.createElement('script');
    s.type = 'text/javascript';
    s.src = '//www.highperformanceformat.com/eb64514c8ad66e0c2f82e4a5fee98217/invoke.js';
    wrapper.appendChild(s);
  }, 50);
}

function createPost() {
  const post = document.createElement('div');
  post.className = 'post';

  const title = titles[Math.floor(Math.random() * titles.length)];
  const h2 = document.createElement('h2');
  h2.innerText = title;
  post.appendChild(h2);

  for (let i = 1; i <= 6; i++) {
    const p = document.createElement('p');
    p.innerText = paragraphs[Math.floor(Math.random() * paragraphs.length)];
    post.appendChild(p);
    if (i % 2 === 0) injectAd(post);
  }

  return post;
}

function loadPosts(num) {
  const content = document.getElementById('content');
  for (let i = 0; i < num; i++) {
    content.appendChild(createPost());
  }
}

loadPosts(6);
injectAd(document.getElementById('footerAd'));

let loading = false;
window.addEventListener('scroll', () => {
  if (!loading && window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loading = true;
    loadPosts(3);
    setTimeout(() => loading = false, 1500);
  }
});
</script>
